<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a2035"/>
      <stop offset="100%" stop-color="#0A0F1C"/>
    </radialGradient>
    <radialGradient id="hubGrad" cx="45%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#FBA94C"/>
      <stop offset="100%" stop-color="#EA580C"/>
    </radialGradient>
    <linearGradient id="treadGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#374151"/>
      <stop offset="100%" stop-color="#1F2937"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Outer tire rubber -->
  <circle cx="256" cy="256" r="200" fill="#1F2937" stroke="#374151" stroke-width="4"/>
  <!-- Tread pattern - outer ring grooves -->
  <circle cx="256" cy="256" r="188" fill="none" stroke="#111827" stroke-width="8"/>
  <circle cx="256" cy="256" r="170" fill="none" stroke="#111827" stroke-width="3"/>
  <!-- Tread blocks -->
  <g fill="#374151" opacity="0.7">
    <rect x="250" y="58" width="12" height="32" rx="4" transform="rotate(0,256,256)"/>
    <rect x="250" y="58" width="12" height="32" rx="4" transform="rotate(30,256,256)"/>
    <rect x="250" y="58" width="12" height="32" rx="4" transform="rotate(60,256,256)"/>
    <rect x="250" y="58" width="12" height="32" rx="4" transform="rotate(90,256,256)"/>
    <rect x="250" y="58" width="12" height="32" rx="4" transform="rotate(120,256,256)"/>
    <rect x="250" y="58" width="12" height="32" rx="4" transform="rotate(150,256,256)"/>
    <rect x="250" y="58" width="12" height="32" rx="4" transform="rotate(180,256,256)"/>
    <rect x="250" y="58" width="12" height="32" rx="4" transform="rotate(210,256,256)"/>
    <rect x="250" y="58" width="12" height="32" rx="4" transform="rotate(240,256,256)"/>
    <rect x="250" y="58" width="12" height="32" rx="4" transform="rotate(270,256,256)"/>
    <rect x="250" y="58" width="12" height="32" rx="4" transform="rotate(300,256,256)"/>
    <rect x="250" y="58" width="12" height="32" rx="4" transform="rotate(330,256,256)"/>
  </g>
  <!-- Inner sidewall -->
  <circle cx="256" cy="256" r="145" fill="#0A0F1C"/>
  <!-- Rim - metallic ring -->
  <circle cx="256" cy="256" r="130" fill="none" stroke="#6B7280" stroke-width="6"/>
  <circle cx="256" cy="256" r="120" fill="#111827" stroke="#4B5563" stroke-width="2"/>
  <!-- Spokes -->
  <g stroke="#F97316" stroke-width="8" stroke-linecap="round" opacity="0.9">
    <line x1="256" y1="150" x2="256" y2="200" transform="rotate(0,256,256)"/>
    <line x1="256" y1="150" x2="256" y2="200" transform="rotate(72,256,256)"/>
    <line x1="256" y1="150" x2="256" y2="200" transform="rotate(144,256,256)"/>
    <line x1="256" y1="150" x2="256" y2="200" transform="rotate(216,256,256)"/>
    <line x1="256" y1="150" x2="256" y2="200" transform="rotate(288,256,256)"/>
  </g>
  <!-- Hub center -->
  <circle cx="256" cy="256" r="50" fill="url(#hubGrad)"/>
  <circle cx="256" cy="256" r="35" fill="#0A0F1C" stroke="#F97316" stroke-width="3"/>
  <!-- Center bolt pattern -->
  <g fill="#F97316">
    <circle cx="256" cy="232" r="5"/>
    <circle cx="278" cy="248" r="5"/>
    <circle cx="270" cy="274" r="5"/>
    <circle cx="242" cy="274" r="5"/>
    <circle cx="234" cy="248" r="5"/>
  </g>
  <!-- Center cap -->
  <circle cx="256" cy="256" r="12" fill="#F97316"/>
  <circle cx="256" cy="256" r="6" fill="#0A0F1C"/>
</svg>